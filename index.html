<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AC Personal Best Viewer</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="container">
            <header>
                <h1>Assetto Corsa Personal Best Viewer</h1>
                <p>
                    Upload your <code>personalbest.ini</code> to view your
                    records.
                </p>
            </header>

            <main>
                <div id="drop-zone" class="drop-zone">
                    <p>Drag and drop <code>personalbest.ini</code> here</p>
                    <span>or</span>
                    <input type="file" id="file-input" accept=".ini" />
                    <label for="file-input" class="btn">Select File</label>
                </div>

                <div id="results-container" class="hidden">
                    <div class="controls">
                        <input
                            type="text"
                            id="search-input"
                            placeholder="Search car or track..."
                        />
                        <button id="clear-btn" class="btn btn-secondary">
                            Clear
                        </button>
                    </div>
                    <div class="table-wrapper">
                        <table id="results-table">
                            <thead>
                                <tr>
                                    <th data-sort="car">Car</th>
                                    <th data-sort="track">Track</th>
                                    <th data-sort="date">Date</th>
                                    <th data-sort="time">Best Time</th>
                                </tr>
                            </thead>
                            <tbody id="table-body">
                                <!-- Data will be injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>

            <footer>
                <p>
                    Your data stays on your machine. This is a client-side only
                    tool.
                </p>
            </footer>
        </div>
        <script src="app.js"></script>
    </body>
</html>
